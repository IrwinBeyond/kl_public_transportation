<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malaysia Public Transit Map</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    #sidebar {
      position: absolute; top: 10px; left: 10px; z-index: 10;
      background: rgba(255,255,255,0.95); border-radius: 8px;
      padding: 12px 16px; max-width: 300px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    #sidebar h1 { font-size: 16px; margin-bottom: 6px; }
    #sidebar p { font-size: 11px; color: #666; margin-bottom: 10px; }

    .layer-toggle { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 12px; cursor: pointer; }
    .layer-toggle input { cursor: pointer; }
    .swatch { display: inline-block; width: 18px; height: 3px; border-radius: 1px; margin-right: 2px; }
    .swatch.circle { width: 10px; height: 10px; border-radius: 50%; }

    #legend { position: absolute; bottom: 30px; right: 10px; z-index: 10; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 11px; }
    #legend .legend-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }

    .maplibregl-popup { max-width: 280px; }
    .maplibregl-popup-content { padding: 10px 14px; border-radius: 8px; font-size: 12px; }
    .maplibregl-popup-content strong { display: block; font-size: 13px; margin-bottom: 4px; }
    .maplibregl-popup-content span { display: block; color: #888; font-size: 11px; }
    .maplibregl-popup-content p small { color: #555; font-size: 11px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="sidebar">
    <h1>Malaysia Public Transit</h1>
    <p>GTFS data served via Martin + MapLibre GL JS</p>
    <label class="layer-toggle"><input type="checkbox" id="toggle-rail" checked> <span class="swatch" style="background:#e57200;"></span> Rapid Rail Lines</label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-rail-stops" checked> <span class="swatch circle" style="background:#D50032;"></span> Rapid Rail Stations</label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-bus-routes" checked> <span class="swatch" style="background:#115740;"></span> Rapid Bus Routes</label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-bus-stops" checked> <span class="swatch circle" style="background:#2E8B57;"></span> Rapid Bus Stops</label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-mrt-routes" checked> <span class="swatch" style="background:#FFCD00;"></span> MRT Feeder Routes</label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-mrt-stops" checked> <span class="swatch circle" style="background:#DAA520;"></span> MRT Feeder Stops</label>
    <label class="layer-toggle"><input type="checkbox" id="toggle-ktmb-stops" checked> <span class="swatch circle" style="background:#1964B7;"></span> KTM Stations</label>
  </div>

  <div id="legend" style="display:none;"></div>

  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          basemap: {
            type: 'raster',
            tiles: ['https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'],
            tileSize: 256,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
          },
          routes: {
            type: 'vector',
            tiles: ['http://yuellen.my.id/martin/transit_routes/{z}/{x}/{y}'],
            minzoom: 6,
            maxzoom: 20
          },
          stops: {
            type: 'vector',
            tiles: ['http://yuellen.my.id/martin/transit_stops/{z}/{x}/{y}'],
            minzoom: 8,
            maxzoom: 20
          }
        },
        layers: [
          {
            id: 'basemap-layer',
            type: 'raster',
            source: 'basemap'
          },
          {
            id: 'rail-lines',
            type: 'line',
            source: 'routes',
            'source-layer': 'transit_routes',
            filter: ['==', ['get', 'agency'], 'rapid-rail'],
            paint: {
              'line-color': ['coalesce', ['get', 'route_color'], '#e57200'],
              'line-width': ['interpolate', ['linear'], ['zoom'],
                8, 2, 12, 4, 18, 7
              ],
              'line-opacity': 0.85
            },
            layout: { 'line-join': 'round', 'line-cap': 'round' }
          },
          {
            id: 'bus-routes',
            type: 'line',
            source: 'routes',
            'source-layer': 'transit_routes',
            filter: ['==', ['get', 'agency'], 'rapid-bus'],
            paint: {
              'line-color': ['coalesce', ['get', 'route_color'], '#115740'],
              'line-width': ['interpolate', ['linear'], ['zoom'],
                10, 0.5, 13, 1.5, 18, 3
              ],
              'line-opacity': ['interpolate', ['linear'], ['zoom'],
                10, 0.2, 14, 0.5, 18, 0.8
              ]
            },
            layout: { 'line-join': 'round', 'line-cap': 'round' }
          },
          {
            id: 'mrt-feeder-routes',
            type: 'line',
            source: 'routes',
            'source-layer': 'transit_routes',
            filter: ['==', ['get', 'agency'], 'rapid-mrt'],
            paint: {
              'line-color': ['coalesce', ['get', 'route_color'], '#FFCD00'],
              'line-width': ['interpolate', ['linear'], ['zoom'],
                10, 0.5, 13, 1.5, 18, 3
              ],
              'line-opacity': ['interpolate', ['linear'], ['zoom'],
                10, 0.2, 14, 0.5, 18, 0.8
              ]
            },
            layout: { 'line-join': 'round', 'line-cap': 'round' }
          },
          {
            id: 'rail-stops',
            type: 'circle',
            source: 'stops',
            'source-layer': 'transit_stops',
            filter: ['==', ['get', 'agency'], 'rapid-rail'],
            paint: {
              'circle-radius': ['interpolate', ['linear'], ['zoom'],
                10, 2, 14, 5, 18, 9
              ],
              'circle-color': '#D50032',
              'circle-opacity': 0.85,
              'circle-stroke-width': 1,
              'circle-stroke-color': '#fff'
            }
          },
          {
            id: 'bus-stops',
            type: 'circle',
            source: 'stops',
            'source-layer': 'transit_stops',
            filter: ['==', ['get', 'agency'], 'rapid-bus'],
            minzoom: 13,
            paint: {
              'circle-radius': ['interpolate', ['linear'], ['zoom'],
                13, 1.5, 16, 4, 18, 6
              ],
              'circle-color': '#2E8B57',
              'circle-opacity': 0.6
            }
          },
          {
            id: 'mrt-feeder-stops',
            type: 'circle',
            source: 'stops',
            'source-layer': 'transit_stops',
            filter: ['==', ['get', 'agency'], 'rapid-mrt'],
            minzoom: 13,
            paint: {
              'circle-radius': ['interpolate', ['linear'], ['zoom'],
                13, 1.5, 16, 4, 18, 6
              ],
              'circle-color': '#DAA520',
              'circle-opacity': 0.6
            }
          },
          {
            id: 'ktmb-stops',
            type: 'circle',
            source: 'stops',
            'source-layer': 'transit_stops',
            filter: ['==', ['get', 'agency'], 'ktmb'],
            paint: {
              'circle-radius': ['interpolate', ['linear'], ['zoom'],
                10, 2, 14, 5, 18, 9
              ],
              'circle-color': '#1964B7',
              'circle-opacity': 0.85,
              'circle-stroke-width': 1,
              'circle-stroke-color': '#fff'
            }
          }
        ],
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
      },
      center: [101.69, 3.14],
      zoom: 10.5,
      maxBounds: [[98.5, 0.5], [120, 7.5]]
    });

    // Route line popup
    map.on('click', 'rail-lines', (e) => {
      const props = e.features[0].properties;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${props.route_short_name || '?'}</strong><span>${props.route_long_name || ''}</span>`)
        .addTo(map);
    });
    map.on('click', 'bus-routes', (e) => {
      const props = e.features[0].properties;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${props.route_short_name || '?'}</strong><span>${props.route_long_name || ''}</span>`)
        .addTo(map);
    });
    map.on('click', 'mrt-feeder-routes', (e) => {
      const props = e.features[0].properties;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${props.route_short_name || '?'}</strong><span>${props.route_long_name || ''}</span>`)
        .addTo(map);
    });

    function agencyLabel(agency) {
      const labels = { 'ktmb': 'KTM', 'rapid-rail': 'Rapid Rail', 'rapid-bus': 'Rapid Bus', 'rapid-mrt': 'MRT Feeder' };
      return labels[agency] || agency || '';
    }

    function stopPopup(e) {
      const props = e.features[0].properties;
      const agency = agencyLabel(props.agency);
      let html = `<strong>${props.stop_name || 'Unnamed'}</strong>`;
      if (agency) html += `<span>${agency}</span>`;
      if (props.stop_code) html += `<span>Code: ${props.stop_code}</span>`;
      if (props.routes) html += `<p style="margin-top:6px;line-height:1.5"><small>${props.routes}</small></p>`;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(html)
        .addTo(map);
    }
    map.on('click', 'rail-stops', stopPopup);
    map.on('click', 'bus-stops', stopPopup);
    map.on('click', 'mrt-feeder-stops', stopPopup);
    map.on('click', 'ktmb-stops', stopPopup);

    // Cursor changes
    ['rail-lines','bus-routes','mrt-feeder-routes'].forEach(id => {
      map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
    });
    ['rail-stops','bus-stops','mrt-feeder-stops','ktmb-stops'].forEach(id => {
      map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
    });

    // Layer toggles
    document.getElementById('toggle-rail').addEventListener('change', function() {
      map.setLayoutProperty('rail-lines', 'visibility', this.checked ? 'visible' : 'none');
    });
    document.getElementById('toggle-rail-stops').addEventListener('change', function() {
      map.setLayoutProperty('rail-stops', 'visibility', this.checked ? 'visible' : 'none');
    });
    document.getElementById('toggle-bus-routes').addEventListener('change', function() {
      map.setLayoutProperty('bus-routes', 'visibility', this.checked ? 'visible' : 'none');
    });
    document.getElementById('toggle-bus-stops').addEventListener('change', function() {
      map.setLayoutProperty('bus-stops', 'visibility', this.checked ? 'visible' : 'none');
    });
    document.getElementById('toggle-mrt-routes').addEventListener('change', function() {
      map.setLayoutProperty('mrt-feeder-routes', 'visibility', this.checked ? 'visible' : 'none');
    });
    document.getElementById('toggle-mrt-stops').addEventListener('change', function() {
      map.setLayoutProperty('mrt-feeder-stops', 'visibility', this.checked ? 'visible' : 'none');
    });
    document.getElementById('toggle-ktmb-stops').addEventListener('change', function() {
      map.setLayoutProperty('ktmb-stops', 'visibility', this.checked ? 'visible' : 'none');
    });

    // Geolocate
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');
  </script>
</body>
</html>
